openapi: 3.0.3
info:
  title: GrubHub Payments API
  description: |
    REST API for processing payments, managing refunds, and handling
    billing for orders on the GrubHub platform.
  version: 1.0.0
  contact:
    name: GrubHub API Platform Team
    email: api-platform@grubhub.com

servers:
  - url: https://api.grubhub.com/payments/v1
    description: Production
  - url: https://staging-api.grubhub.com/payments/v1
    description: Staging
  - url: http://localhost:3001/api/v1
    description: Local development

security:
  - ApiKeyAuth: []

tags:
  - name: Payments
    description: Payment processing and management
  - name: Refunds
    description: Refund lifecycle management
  - name: Invoices
    description: Invoice generation and retrieval
  - name: Health
    description: Service health monitoring

paths:
  /payments:
    get:
      tags: [Payments]
      summary: List payments
      operationId: listPayments
      parameters:
        - name: orderId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, failed, refunded]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of payments
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'
                  total:
                    type: integer
    post:
      tags: [Payments]
      summary: Process a payment
      operationId: processPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '201':
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /payments/{paymentId}:
    get:
      tags: [Payments]
      summary: Get payment details
      operationId: getPayment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /refunds:
    post:
      tags: [Refunds]
      summary: Create a refund
      operationId: createRefund
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
      responses:
        '201':
          description: Refund created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Refund'

  /refunds/{refundId}:
    get:
      tags: [Refunds]
      summary: Get refund status
      operationId: getRefund
      parameters:
        - name: refundId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Refund details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Refund'

  /invoices:
    get:
      tags: [Invoices]
      summary: List invoices
      operationId: listInvoices
      parameters:
        - name: restaurantId
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
                  total:
                    type: integer

  /invoices/{invoiceId}:
    get:
      tags: [Invoices]
      summary: Get invoice details
      operationId: getInvoice
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'

  /health:
    get:
      tags: [Health]
      summary: Service health check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Payment:
      type: object
      properties:
        id:
          type: string
        orderId:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
          default: USD
        status:
          type: string
          enum: [pending, completed, failed, refunded]
        method:
          type: string
          enum: [credit_card, debit_card, apple_pay, google_pay]
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    PaymentRequest:
      type: object
      required: [orderId, amount, method]
      properties:
        orderId:
          type: string
        amount:
          type: number
          format: double
        method:
          type: string
          enum: [credit_card, debit_card, apple_pay, google_pay]
        token:
          type: string

    Refund:
      type: object
      properties:
        id:
          type: string
        paymentId:
          type: string
        amount:
          type: number
          format: double
        reason:
          type: string
        status:
          type: string
          enum: [pending, approved, processed, rejected]
        createdAt:
          type: string
          format: date-time

    RefundRequest:
      type: object
      required: [paymentId, amount, reason]
      properties:
        paymentId:
          type: string
        amount:
          type: number
          format: double
        reason:
          type: string

    Invoice:
      type: object
      properties:
        id:
          type: string
        restaurantId:
          type: string
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        totalAmount:
          type: number
          format: double
        commissionAmount:
          type: number
          format: double
        netAmount:
          type: number
          format: double
        status:
          type: string
          enum: [draft, issued, paid]
        createdAt:
          type: string
          format: date-time

    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time
