type: http
name: Get invoice details
url: '{{baseUrl}}/invoices/:invoiceId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: invoiceId
    value: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "restaurantId": "string",
            "periodStart": "2022-04-12",
            "periodEnd": "1953-09-23",
            "totalAmount": 3177.40833402979,
            "commissionAmount": 2639.5972212007314,
            "netAmount": 9651.693865276186,
            "status": "paid",
            "createdAt": "1976-12-24T02:03:44.137Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invoice details
