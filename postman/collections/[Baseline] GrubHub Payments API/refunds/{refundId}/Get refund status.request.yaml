type: http
name: Get refund status
url: '{{baseUrl}}/refunds/:refundId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: refundId
    value: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "paymentId": "string",
            "amount": 1134.9823758348987,
            "reason": "string",
            "status": "rejected",
            "createdAt": "2017-07-01T02:15:31.370Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Refund details
