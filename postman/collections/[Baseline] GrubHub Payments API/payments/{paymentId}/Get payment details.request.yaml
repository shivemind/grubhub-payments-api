type: http
name: Get payment details
url: '{{baseUrl}}/payments/:paymentId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: paymentId
    value: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "orderId": "string",
            "amount": 8850.637147778452,
            "currency": "USD",
            "status": "completed",
            "method": "google_pay",
            "createdAt": "2023-05-15T17:30:20.765Z",
            "completedAt": "2008-06-06T14:38:34.065Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Payment details
