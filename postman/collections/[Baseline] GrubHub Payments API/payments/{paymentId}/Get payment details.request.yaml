type: http
name: Get payment details
url: '{{baseUrl}}/payments/:paymentId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: paymentId
    value: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "orderId": "string",
            "amount": 9526.231719354802,
            "currency": "USD",
            "status": "pending",
            "method": "apple_pay",
            "createdAt": "2019-03-22T15:19:10.695Z",
            "completedAt": "2024-09-04T12:25:38.237Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Payment details
