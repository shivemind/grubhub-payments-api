type: http
name: Process a payment
url: '{{baseUrl}}/payments'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "orderId": "string",
      "amount": 2320.6768713908255,
      "method": "apple_pay",
      "token": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "string",
            "orderId": "string",
            "amount": 8850.637147778452,
            "currency": "USD",
            "status": "completed",
            "method": "google_pay",
            "createdAt": "2023-05-15T17:30:20.765Z",
            "completedAt": "2008-06-06T14:38:34.065Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Payment processed
