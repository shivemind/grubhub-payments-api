type: http
name: Process a payment
url: '{{baseUrl}}/payments'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "orderId": "string",
      "amount": 8198.987283699485,
      "method": "apple_pay",
      "token": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "string",
            "orderId": "string",
            "amount": 9526.231719354802,
            "currency": "USD",
            "status": "pending",
            "method": "apple_pay",
            "createdAt": "2019-03-22T15:19:10.695Z",
            "completedAt": "2024-09-04T12:25:38.237Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Payment processed
