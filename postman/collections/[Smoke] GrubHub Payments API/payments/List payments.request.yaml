type: http
name: List payments
url: '{{baseUrl}}/payments?orderId=string&status=completed&limit=20'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: orderId
    value: string
  - key: status
    value: completed
  - key: limit
    value: '20'
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "payments": [
              {
                "id": "string",
                "orderId": "string",
                "amount": 2601.683885997994,
                "currency": "USD",
                "status": "failed",
                "method": "debit_card",
                "createdAt": "1960-05-11T04:29:28.664Z",
                "completedAt": "1972-11-02T14:59:59.695Z"
              },
              {
                "id": "string",
                "orderId": "string",
                "amount": 6913.0663715626215,
                "currency": "USD",
                "status": "pending",
                "method": "google_pay",
                "createdAt": "2010-04-07T21:48:52.546Z",
                "completedAt": "1981-12-30T17:05:43.602Z"
              }
            ],
            "total": 8366
          }
      headers:
        - key: Content-Type
          value: application/json
    name: List of payments
