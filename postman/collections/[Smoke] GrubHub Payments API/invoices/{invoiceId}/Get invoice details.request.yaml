type: http
name: Get invoice details
url: '{{baseUrl}}/invoices/:invoiceId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: invoiceId
    value: string
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "restaurantId": "string",
            "periodStart": "1960-04-23",
            "periodEnd": "1994-11-14",
            "totalAmount": 8233.446646029302,
            "commissionAmount": 4939.80490644387,
            "netAmount": 3215.7106081872366,
            "status": "issued",
            "createdAt": "1984-05-25T04:25:05.577Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invoice details
